<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Acesso — Sistema Clínica</title>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --verde:#2D9B6F;--verde-c:#e8f5f0;--verde-e:#1a6e4a;
      --vermelho:#E24B4A;--txt:#1a1a2e;--ct:#6b7280;--bg:#f0f4f0;--card:#fff;--borda:#e5e7eb;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:1rem;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:linear-gradient(135deg,var(--verde-e) 0%,var(--verde) 100%);
      opacity:.08;pointer-events:none;
    }
    .box{
      background:var(--card);border-radius:20px;padding:2.5rem 2rem;
      max-width:360px;width:100%;
      box-shadow:0 8px 40px rgba(0,0,0,.12);
      text-align:center;
      animation:fadein .4s ease;
    }
    @keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    .logo-wrap{
      background:white;border-radius:14px;padding:10px 20px;
      display:inline-block;margin-bottom:1.25rem;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .logo-wrap img{height:64px;object-fit:contain;display:block}
    h1{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:2px}
    .sub{font-size:12px;color:var(--ct);margin-bottom:2rem}
    .divider{height:1px;background:var(--borda);margin-bottom:1.5rem}
    .lock{font-size:32px;margin-bottom:.75rem}
    .label{font-size:12px;font-weight:600;color:var(--ct);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;display:block}
    /* PIN dots */
    .pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:1.5rem;min-height:20px}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--borda);transition:.15s}
    .pin-dot.filled{background:var(--verde);border-color:var(--verde)}
    /* Teclado numérico */
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
    .key{
      padding:14px;border-radius:12px;border:1.5px solid var(--borda);
      background:var(--bg);font-size:18px;font-weight:600;cursor:pointer;
      transition:.1s;color:var(--txt);font-family:inherit;
    }
    .key:hover{background:var(--verde-c);border-color:var(--verde);color:var(--verde-e)}
    .key:active{transform:scale(.95)}
    .key.del{font-size:16px;color:var(--ct)}
    .key.enter{background:var(--verde);color:white;border-color:var(--verde);font-size:14px}
    .key.enter:hover{background:var(--verde-e)}
    .key:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
    /* Seleção de usuário */
    .user-btn{
      display:block;width:100%;padding:12px 16px;border-radius:12px;
      border:1.5px solid var(--borda);background:var(--bg);
      font-family:inherit;font-size:14px;font-weight:600;color:var(--txt);
      cursor:pointer;text-align:left;transition:.15s;margin-bottom:.6rem;
    }
    .user-btn:hover{background:var(--verde-c);border-color:var(--verde);color:var(--verde-e)}
    .user-btn .cargo{display:block;font-size:11px;font-weight:400;color:var(--ct);margin-top:2px}
    /* Spinner */
    .spinner{
      display:inline-block;width:16px;height:16px;
      border:2px solid rgba(255,255,255,.4);border-top-color:white;
      border-radius:50%;animation:spin .7s linear infinite;
      vertical-align:middle;margin-right:4px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Mensagens */
    .msg{font-size:13px;margin-bottom:1rem;min-height:18px;transition:.2s}
    .msg.erro{color:var(--vermelho)}
    .msg.ok{color:var(--verde-e)}
    .shake{animation:shake .4s ease}
    /* Input oculto (acessibilidade teclado físico) */
    #pin-input{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}
    /* Versão */
    .versao{font-size:10px;color:var(--borda);margin-top:1.25rem}
  </style>
</head>
<body>

<div class="box" id="box">
  <div class="logo-wrap">
    <img id="login-logo" src="logo.jpg" alt="Logo"/>
  </div>
  <h1 id="login-nome">Clínica</h1>
  <p class="sub" id="login-esp"></p>

  <div class="divider"></div>

  <div id="tela-selecao">
    <span class="label">Quem é você?</span>
    <div id="lista-usuarios"></div>
  </div>

  <div id="tela-pin" style="display:none">
    <div class="lock">🔐</div>
    <div id="usuario-atual" style="font-size:13px;color:var(--ct);margin-bottom:1rem"></div>
    <span class="label">Digite o PIN de acesso</span>

    <div class="pin-dots" id="pin-dots"></div>

    <div class="msg" id="msg"></div>

    <input type="password" id="pin-input" inputmode="numeric" maxlength="10" autocomplete="off"/>

    <div class="keypad" id="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key del" onclick="pressKey('del')">⌫</button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key enter" id="btn-enter" onclick="pressKey('enter')">Entrar</button>
    </div>
  </div>

  <div class="versao">Sistema de Gestão Clínica · v2.2</div>
</div>

<script>
// ── Dados da clínica ──
document.getElementById('login-logo').src = CLINICA_CONFIG.logo || 'logo.jpg';
document.getElementById('login-nome').textContent = CLINICA_CONFIG.nome || 'Clínica';
document.getElementById('login-esp').textContent = CLINICA_CONFIG.especialidade || '';
document.title = 'Acesso — ' + (CLINICA_CONFIG.nome || 'Clínica');

// ── Sessão válida? Redireciona direto ──
try {
  const auth = JSON.parse(localStorage.getItem('clinica_auth') || '{}');
  if (auth.ok && auth.expires > Date.now()) {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('r') || 'index.html';
  }
} catch(e) {}

// ── Configurações ──
const TAMANHO = CLINICA_CONFIG.pinLength || 4;
const MAX_TENTATIVAS = 5;
const BLOQUEIO_MS = 15 * 60 * 1000;
const STORAGE_KEY = 'clinica_pin_falhas';
let pin = '';
let processando = false;
let usuarioSelecionado = null;   // {id, nome, cargo, email}
let usuariosDisponiveis = [];

// ── Seleção de usuário (multiusuário) ──
async function carregarUsuarios() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/usuarios_publico?select=*`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    const usuarios = await res.json();

    if (!Array.isArray(usuarios) || usuarios.length === 0) {
      // View ainda não existe ou não retornou ninguém — usa o login antigo (1 e-mail fixo)
      usuarioSelecionado = { email: CLINICA_CONFIG.loginEmail, nome: '' };
      mostrarTelaPin();
      return;
    }

    if (usuarios.length === 1) {
      // Só uma pessoa usa o sistema — pula direto pro PIN, sem tela extra
      usuarioSelecionado = usuarios[0];
      mostrarTelaPin();
      return;
    }

    usuariosDisponiveis = usuarios;
    const cont = document.getElementById('lista-usuarios');
    cont.innerHTML = usuarios.map((u, i) => `
      <button type="button" class="user-btn" onclick="selecionarUsuario(${i})">
        ${u.nome}${u.cargo ? `<span class="cargo">${u.cargo}</span>` : ''}
      </button>
    `).join('');
  } catch(e) {
    usuarioSelecionado = { email: CLINICA_CONFIG.loginEmail, nome: '' };
    mostrarTelaPin();
  }
}

function selecionarUsuario(indice) {
  usuarioSelecionado = usuariosDisponiveis[indice];
  mostrarTelaPin();
}

function trocarUsuario() {
  usuarioSelecionado = null;
  pin = '';
  document.getElementById('tela-pin').style.display = 'none';
  document.getElementById('tela-selecao').style.display = 'block';
}

function mostrarTelaPin() {
  document.getElementById('tela-selecao').style.display = 'none';
  document.getElementById('tela-pin').style.display = 'block';
  const label = document.getElementById('usuario-atual');
  label.innerHTML = usuarioSelecionado && usuarioSelecionado.nome
    ? `${usuarioSelecionado.nome} · <a href="#" onclick="trocarUsuario();return false" style="color:var(--verde-e)">trocar</a>`
    : '';
  renderDots();
}

carregarUsuarios();

// ── Controle de tentativas ──
function getFalhas() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"n":0,"t":0}'); }
  catch(e) { return {n:0, t:0}; }
}
function setFalhas(n, t) { localStorage.setItem(STORAGE_KEY, JSON.stringify({n, t})); }
function resetFalhas() { localStorage.removeItem(STORAGE_KEY); }

function verificarBloqueio() {
  const f = getFalhas();
  if (f.n >= MAX_TENTATIVAS) {
    const restante = f.t + BLOQUEIO_MS - Date.now();
    if (restante > 0) {
      const min = Math.ceil(restante / 60000);
      return `🔒 Acesso bloqueado. Tente novamente em ${min} minuto${min > 1 ? 's' : ''}.`;
    } else {
      resetFalhas();
    }
  }
  return null;
}

function registrarFalha() {
  const f = getFalhas();
  const novas = f.n + 1;
  setFalhas(novas, novas >= MAX_TENTATIVAS ? Date.now() : f.t);
  const restantes = MAX_TENTATIVAS - novas;
  if (restantes <= 0) return `🔒 Acesso bloqueado por 15 minutos.`;
  return `❌ PIN incorreto. ${restantes} tentativa${restantes > 1 ? 's' : ''} restante${restantes > 1 ? 's' : ''}.`;
}

// ── Dots ──
function renderDots() {
  const cont = document.getElementById('pin-dots');
  cont.innerHTML = '';
  for (let i = 0; i < TAMANHO; i++) {
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
    cont.appendChild(d);
  }
}
renderDots();

// ── Bloquear/desbloquear teclado durante requisição ──
function setProcessando(estado) {
  processando = estado;
  document.querySelectorAll('.key').forEach(b => {
    b.disabled = estado;
  });
  const btnEnter = document.getElementById('btn-enter');
  if (estado) {
    btnEnter.innerHTML = '<span class="spinner"></span>Aguarde';
  } else {
    btnEnter.textContent = 'Entrar';
  }
}

// ── Lógica principal ──
async function pressKey(k) {
  if (processando) return;

  const msg = document.getElementById('msg');

  const bloqueado = verificarBloqueio();
  if (bloqueado) {
    msg.className = 'msg erro';
    msg.textContent = bloqueado;
    return;
  }

  if (k === 'del') {
    pin = pin.slice(0, -1);
    msg.textContent = '';
    renderDots();
    return;
  }

  // Tecla numérica — acumula
  if (/\d/.test(k) && k !== 'enter' && pin.length < TAMANHO) {
    pin += k;
    renderDots();
    // Auto-submit ao completar
    if (pin.length === TAMANHO) setTimeout(() => pressKey('enter'), 150);
    return;
  }

  // Enter — tenta autenticar
  if (k === 'enter') {
    if (pin.length < TAMANHO) return; // PIN incompleto, ignora

    setProcessando(true);
    msg.className = 'msg';
    msg.textContent = '';

    const resultado = await authLogin(pin, usuarioSelecionado ? usuarioSelecionado.email : null);

    if (resultado.ok) {
      resetFalhas();
      msg.className = 'msg ok';
      msg.textContent = '✅ Acesso liberado!';
      setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('r') || 'index.html';
      }, 500);
    } else {
      const erroMsg = registrarFalha();
      msg.className = 'msg erro';
      msg.textContent = erroMsg;
      const box = document.getElementById('box');
      box.classList.add('shake');
      setTimeout(() => box.classList.remove('shake'), 400);
      pin = '';
      renderDots();
      setProcessando(false);
    }
  }
}

// ── Teclado físico ──
document.addEventListener('keydown', e => {
  if (processando) return;
  if (/^\d$/.test(e.key)) pressKey(e.key);
  else if (e.key === 'Backspace') pressKey('del');
  else if (e.key === 'Enter') pressKey('enter');
});

document.getElementById('pin-input').focus();
</script>
</body>
</html>
