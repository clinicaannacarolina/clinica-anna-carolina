<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Auditoria — Clínica</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
<script>
// Auth check — redireciona para login se não autenticado
try{
  const auth = JSON.parse(localStorage.getItem('clinica_auth')||'{}');
  if(!auth.ok || auth.expires < Date.now()){
    window.location.replace('login.html');
  } else {
    sessionStorage.setItem('clinica_auth','1');
  }
}catch(e){ window.location.replace('login.html'); }
</script>
<style>
:root {
  --verde:#1D9E75;--verde-e:#0F6E56;--verde-c:#E1F5EE;
  --amarelo:#EF9F27;--amarelo-c:#FAEEDA;
  --vermelho:#E24B4A;--vermelho-c:#FCEBEB;
  --rosa:#D4537E;--rosa-c:#FBEAF0;
  --azul:#185FA5;--azul-c:#E6F1FB;
  --roxo:#7C3AED;--roxo-c:#EDE9FE;
  --bg:#F7F6F3;--card:#FFFFFF;--borda:#E8E6E1;--ct:#6B6860;--txt:#1A1916;
  --s:0 1px 3px rgba(0,0,0,.06);--sm:0 4px 12px rgba(0,0,0,.08);
}
[data-theme="dark"] {
  --bg:#1A1916;--card:#242220;--borda:#3A3835;--ct:#9A9690;--txt:#F0EDE8;
  --verde-c:#0F3D2E;--amarelo-c:#3D2E0A;--vermelho-c:#3D1515;--rosa-c:#3D1A28;--azul-c:#0F2540;--roxo-c:#2D1A5E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;transition:background .2s,color .2s}
.hdr{background:var(--verde-e);color:white;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr h1{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400}
.hdr span{font-size:11px;opacity:.7;margin-left:4px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-date{font-size:11px;opacity:.7}
.btn-dark{background:none;border:none;cursor:pointer;font-size:18px;color:white;opacity:.8;padding:4px}
.btn-dark:hover{opacity:1}
.main{max-width:1000px;margin:0 auto;padding:1.5rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.sc{background:var(--card);border-radius:12px;padding:1rem 1.25rem;box-shadow:var(--s);border:1px solid var(--borda);display:flex;align-items:center;gap:12px}
.si{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sn{font-size:24px;font-weight:600;line-height:1;color:var(--txt)}
.sl{font-size:12px;color:var(--ct);margin-top:2px}
.tabs{display:flex;gap:3px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:1.5rem;box-shadow:var(--s);border:1px solid var(--borda);flex-wrap:wrap}
.tb{flex:1;min-width:60px;padding:8px 6px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--ct);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px}
.tb.active{background:var(--verde);color:white;box-shadow:0 2px 6px rgba(29,158,117,.3)}
.tb:not(.active):hover{background:var(--bg)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--card);border-radius:12px;padding:1.25rem;box-shadow:var(--s);border:1px solid var(--borda);margin-bottom:1rem}
.sl2{font-size:11px;font-weight:600;color:var(--ct);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;margin-top:1.25rem;display:flex;align-items:center;justify-content:space-between}
.sl2:first-child{margin-top:0}
.ai{border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-left:4px solid}
.ai.urg{background:var(--vermelho-c);border-color:var(--vermelho)}
.ai.ate{background:var(--amarelo-c);border-color:var(--amarelo)}
.ai.anv{background:var(--rosa-c);border-color:var(--rosa)}
.ai.lem{background:var(--azul-c);border-color:var(--azul)}
.ai.agua{background:var(--azul-c);border-color:var(--azul)}
.agua .ab{background:#B5D4F4;color:#0C447C}
.an{font-weight:600;font-size:14px}
.ad{font-size:12px;color:var(--ct);margin-top:2px}
.ab{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.urg .ab{background:#F7C1C1;color:#791F1F}
.ate .ab{background:#FAC775;color:#633806}
.anv .ab{background:#F4C0D1;color:#72243E}
.lem .ab{background:#B5D4F4;color:#0C447C}
.ver .ab{background:#DDD6FE;color:#4C1D95}
.aa{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pr{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--borda);flex-wrap:wrap}
.pr:last-child{border-bottom:none}
.av{width:38px;height:38px;border-radius:50%;background:var(--verde-c);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:var(--verde-e);flex-shrink:0;margin-top:2px}
.pi{flex:1;min-width:0}
.pn{font-weight:600;font-size:14px}
.ps{font-size:12px;color:var(--ct);line-height:1.7;margin-top:2px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge.ret{background:var(--verde-c);color:var(--verde-e);font-weight:500}
.badge.atra{background:var(--vermelho-c);color:#791F1F;font-weight:500}
.badge.sem{background:var(--bg);color:var(--ct)}
.badge.prox{background:var(--amarelo-c);color:#633806;font-weight:500}
.pa{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgr{display:flex;flex-direction:column;gap:5px}
.fgr.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:var(--ct);text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{padding:9px 11px;border:1.5px solid var(--borda);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--txt);transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
textarea{resize:vertical;min-height:70px}
.tl{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.ti{display:grid;grid-template-columns:1fr 90px 80px 80px 30px;gap:6px;align-items:center;background:var(--bg);border-radius:8px;padding:7px 9px}
.ti select,.ti input{padding:6px 8px;font-size:13px}
.btn-rt{width:30px;height:30px;border:none;background:none;cursor:pointer;color:var(--vermelho);font-size:15px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.btn-rt:hover{background:var(--vermelho-c)}
.btn-at{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border:1.5px dashed var(--verde);border-radius:8px;background:none;color:var(--verde);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:5px;transition:all .15s}
.btn-at:hover{background:var(--verde-c)}
.th{display:grid;grid-template-columns:1fr 90px 80px 80px 30px;gap:6px;padding:0 9px}
.th span{font-size:11px;font-weight:600;color:var(--ct);text-transform:uppercase;letter-spacing:.04em}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--borda);background:var(--card);color:var(--txt);transition:all .15s;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.btn:hover{background:var(--bg)}
.btn.pri{background:var(--verde);color:white;border-color:var(--verde);box-shadow:0 2px 6px rgba(29,158,117,.3)}
.btn.pri:hover{background:var(--verde-e)}
.btn.wpp{background:#25D366;color:white;border-color:#25D366;font-size:12px;padding:7px 12px}
.btn.wpp:hover{background:#128C7E}
.btn.anv{background:var(--rosa);color:white;border-color:var(--rosa);font-size:12px;padding:7px 12px}
.btn.anv:hover{background:#993556}
.btn.dan{color:var(--vermelho);font-size:12px;padding:7px 10px}
.btn.dan:hover{background:var(--vermelho-c)}
.btn.gcal{background:var(--card);color:#EA4335;border-color:#EA4335;font-size:12px;padding:7px 10px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.br{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--borda)}
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
.mb.open{display:flex}
.mx{background:var(--card);border-radius:16px;padding:1.75rem;max-width:500px;width:100%;box-shadow:var(--sm);max-height:90vh;overflow-y:auto}
.mx h3{font-size:17px;font-weight:600;margin-bottom:8px;color:var(--txt)}
.mpv{background:var(--bg);border-radius:10px;padding:12px;font-size:14px;line-height:1.7;white-space:pre-wrap;border:1px solid var(--borda);margin-bottom:1rem;max-height:180px;overflow-y:auto;color:var(--txt)}
.loading{text-align:center;padding:2.5rem;color:var(--ct);font-size:14px}
.empty{text-align:center;padding:2rem 1rem}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty p{color:var(--ct);font-size:14px}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;background:var(--txt);color:var(--bg);padding:11px 18px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:var(--sm);transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.verde{background:var(--verde);color:white}
.toast.vermelho{background:var(--vermelho);color:white}
/* AGENDA */
.ag-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.ag-mes{font-size:16px;font-weight:600;color:var(--txt)}
.ag-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem}
.ag-dlbl{text-align:center;font-size:10px;font-weight:600;color:var(--ct);text-transform:uppercase;padding:3px 0}
.ag-dia{min-height:48px;border-radius:7px;padding:4px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.ag-dia:hover{border-color:var(--verde);background:var(--verde-c)}
.ag-dia.om{opacity:.3;cursor:default}
.ag-dia.om:hover{border-color:transparent;background:none}
.ag-dia.hj{background:var(--verde-c);border-color:var(--verde)}
.ag-dia.sel{background:var(--verde);border-color:var(--verde-e)}
.ag-dia.sel .dn{color:white}
.ag-dia.sel .dp span{background:white}
/* AGENDA VISUAL */
.ag-view-tabs{display:flex;gap:6px;margin-bottom:12px}
.ag-view-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--borda);font-size:13px;cursor:pointer;font-weight:500;background:var(--card);color:var(--ct);transition:all .15s}
.ag-view-tab.active{background:var(--verde);color:white;border-color:var(--verde)}
/* TIMELINE DIA */
.ag-timeline{display:flex;flex-direction:column}
.ag-tl-hora{display:grid;grid-template-columns:48px 1fr;min-height:56px;border-top:1px solid var(--borda);position:relative}
.ag-tl-lbl{font-size:11px;color:var(--ct);padding:4px 8px 0 0;text-align:right;font-weight:500;line-height:1}
.ag-tl-slot{position:relative;min-height:56px;cursor:pointer;transition:background .1s;border-left:1px solid var(--borda)}
.ag-tl-slot:hover{background:var(--verde-c)}
.ag-tl-evento{border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;border-left:3px solid var(--verde-e);margin:2px 4px 4px;transition:transform .1s}
.ag-tl-evento:hover{transform:translateX(2px)}
.ag-tl-evento.can{opacity:.5;border-left-color:#ef4444}
.ag-tl-evento .ev-hora{font-size:10px;font-weight:700;color:var(--verde-e);margin-bottom:2px}
.ag-tl-evento.can .ev-hora{color:#ef4444}
.ag-tl-evento .ev-nome{font-weight:600;font-size:13px;color:var(--txt)}
.ag-tl-evento .ev-proc{font-size:11px;color:var(--ct);margin-top:1px}
.ag-tl-evento .ev-acoes{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
/* SEMANA */
.ag-semana-wrap{overflow-x:auto}
.ag-semana{display:grid;grid-template-columns:44px repeat(7,1fr);min-width:580px}
.ag-sem-cab{font-size:11px;font-weight:700;text-align:center;padding:6px 2px;border-bottom:2px solid var(--borda);background:var(--card);position:sticky;top:0;z-index:3;color:var(--ct)}
.ag-sem-cab.hj{color:var(--verde-e);background:var(--verde-c);border-radius:8px 8px 0 0}
.ag-sem-cab.sel{color:white;background:var(--verde)}
.ag-sem-hora{font-size:10px;color:var(--ct);padding:3px 5px 0 0;text-align:right;border-top:1px solid var(--borda);min-height:44px}
.ag-sem-slot{border-top:1px solid var(--borda);border-left:1px solid var(--borda);min-height:44px;cursor:pointer;position:relative;transition:background .1s}
.ag-sem-slot:hover{background:var(--verde-c)}
.ag-sem-slot.hj-col{background:rgba(74,183,102,.05)}
.ag-sem-ev{border-radius:5px;padding:2px 5px;font-size:11px;font-weight:600;margin:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border-left:2px solid var(--verde-e);display:block}
.ag-sem-ev.can{opacity:.4}
.dn{font-size:12px;font-weight:500;text-align:center;color:var(--txt)}
.hj .dn{color:var(--verde-e);font-weight:700}
.dp{display:flex;gap:2px;justify-content:center;margin-top:3px;flex-wrap:wrap}
.dp span{width:5px;height:5px;border-radius:50%;background:var(--verde);display:inline-block}
.ci{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;margin-bottom:7px;border-left:4px solid var(--verde);background:var(--verde-c);flex-wrap:wrap}
.ci.pen{border-color:var(--amarelo);background:var(--amarelo-c)}
.ci.can{border-color:var(--vermelho);background:var(--vermelho-c);opacity:.7}
.ci.real{border-color:var(--verde);background:var(--verde-c)}
.ci.online{border-color:#7c3aed;background:#f5f3ff}
.badge-online{font-size:10px;font-weight:700;color:#7c3aed;background:#ede9fe;padding:2px 7px;border-radius:20px;margin-left:6px}
.ci.faltou{opacity:.5;border-color:var(--ct);filter:grayscale(.5)}
.ch{font-size:15px;font-weight:700;color:var(--verde-e);min-width:40px}
.pen .ch{color:#633806}
.cn{font-weight:600;font-size:14px;color:var(--txt)}
.cd{font-size:12px;color:var(--ct);margin-top:1px}
.ca{display:flex;gap:5px;flex-wrap:wrap}
.dsl{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;color:var(--txt)}
.sug{position:absolute;left:0;right:0;background:var(--card);border:1.5px solid var(--borda);border-radius:8px;z-index:50;box-shadow:var(--sm);top:4px}
.sug-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--borda);font-size:13px;color:var(--txt)}
.sug-item:hover{background:var(--bg)}
.sug-item:last-child{border-bottom:none}
/* RELATÓRIO */
.rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.rel-card{background:var(--card);border-radius:12px;padding:1.25rem;box-shadow:var(--s);border:1px solid var(--borda);text-align:center}
.rel-num{font-size:28px;font-weight:600;color:var(--verde)}
.rel-label{font-size:12px;color:var(--ct);margin-top:4px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:13px;color:var(--txt);min-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg);border-radius:20px;height:10px;overflow:hidden}
.bar-fill{height:100%;background:var(--verde);border-radius:20px;transition:width .5s}
.bar-val{font-size:12px;color:var(--ct);min-width:30px;text-align:right}
/* FILTRO */
.filtro-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filtro-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--borda);background:var(--card);color:var(--ct);transition:all .15s;font-family:'DM Sans',sans-serif}
.filtro-btn.active{background:var(--verde);color:white;border-color:var(--verde)}
/* VERIFICAÇÃO */
.ver-badge{background:var(--roxo-c);color:var(--roxo);font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}
@media(max-width:600px){
  .main{padding:1rem}
  .stats{grid-template-columns:repeat(2,1fr)}
  .fg{grid-template-columns:1fr}
  .fgr.full{grid-column:1}
  .ti{grid-template-columns:1fr 85px 70px 30px}
  .rel-grid{grid-template-columns:repeat(2,1fr)}
}

@media print {
  .hdr, .stats, .tb, .filtro-row, .filtro-btn,
  #m-cons, #m-atend, #m-docs, #m-lembr, #m-edit,
  #modal-inf, #modal-realizado, #modal-fin,
  .btn, button:not(.no-print-hide) { display: none !important; }
  .panel:not(.active) { display: none !important; }
  body { background: white !important; }
  .card { box-shadow: none !important; }
}
</style>
</head>
<body>
<header class="hdr">
  <div style="display:flex;align-items:center;gap:10px">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    <h1>Dra. Anna Carolina Dias <span>· Harmonização Orofacial</span></h1>
  </div>
  <div class="hdr-right">
    <div class="hdr-date" id="dt-hoje"></div>
    <a href="documentos.html" class="btn-dark" aria-label="Documentos" title="Documentos" style="font-size:15px;text-decoration:none">📄</a>
    <button class="btn-dark" aria-label="Modo escuro" onclick="toggleDark()" id="btn-dark-icon" title="Modo escuro">🌙</button>
    <button class="btn-dark" aria-label="Sair" onclick="fazerLogout()" title="Sair" style="font-size:14px">🔒 Sair</button>
  </div>
</header>
<main class="main">
  <div class="stats">
    <div class="sc"><div class="si" style="background:var(--verde-c)">👤</div><div><div class="sn" id="st-total">—</div><div class="sl">Pacientes</div></div></div>
    <div class="sc"><div class="si" style="background:var(--rosa-c)">🎂</div><div><div class="sn" id="st-aniv">—</div><div class="sl">Aniversários hoje</div></div></div>
    <div class="sc"><div class="si" style="background:var(--amarelo-c)">🔔</div><div><div class="sn" id="st-alertas">—</div><div class="sl">Alertas (15 dias)</div></div></div>
    <div class="sc"><div class="si" style="background:var(--azul-c)">📌</div><div><div class="sn" id="st-lembr">—</div><div class="sl">Lembretes</div></div></div>
  </div>
  <div style="display:flex;align-items:center;gap:0;flex-wrap:wrap">
    <div class="tabs" style="flex:1">
      <button class="tb active" onclick="aba('hoje',this)">⭐ Hoje</button>
      <button class="tb" onclick="aba('agenda',this)" id="tb-agenda">📅 Agenda<span id="badge-online" style="display:none;background:var(--vermelho);color:white;border-radius:50%;font-size:9px;font-weight:700;padding:1px 5px;margin-left:5px;vertical-align:top;line-height:16px"></span></button>
      <button class="tb" onclick="aba('alertas',this)">🔔 Alertas</button>
      <button class="tb" onclick="aba('pacientes',this)">👥 Pacientes</button>
  <style>
    .hdr-pag{background:var(--verde-e);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .hdr-pag a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px}
    .hdr-pag a:hover{color:#fff}
    .kpis,.nav-tabs,.hdr{display:none!important}

function escapeHtml(s){if(s===null||s===undefined)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function dias(dr){if(!dr)return null;const h=new Date();h.setHours(0,0,0,0);const r=new Date(dr+'T12:00:00');return Math.ceil((r-h)/86400000);}

function toast(m,t){var e=document.getElementById('_toast');if(!e)return;e.textContent=m;e.className='toast show '+(t||'ok');setTimeout(function(){e.classList.remove('show');},3000);}
// ── Log de auditoria global ──
async function logAuditoria(acao, descricao, paciente_id=null){
  try{
    await db.from('historico_paciente').insert({
      paciente_id: paciente_id||null,
      acao,
      descricao,
      criado_em: new Date().toISOString()
    });
  }catch(e){ console.warn('[log]',e); }
}

// ── Tela de Auditoria ──
let audOffset=0;
async function renderAuditoria(append=false){
  const el=document.getElementById('aud-lista');
  const elMais=document.getElementById('aud-mais');
  if(!append){audOffset=0;el.innerHTML='<div class="empty"><div class="empty-icon">⏳</div><p>Carregando...</p></div>';}
  const filtroAcao=document.getElementById('aud-filtro-acao')?.value||'';
  const filtroDe=document.getElementById('aud-filtro-de')?.value||'';
  const filtroAte=document.getElementById('aud-filtro-ate')?.value||'';
  let q=db.from('historico_paciente').select('acao,descricao,criado_em,paciente_id,pacientes(nome)').order('criado_em',{ascending:false}).range(audOffset,audOffset+49);
  if(filtroAcao) q=q.ilike('acao','%'+filtroAcao+'%');
  if(filtroDe) q=q.gte('criado_em',filtroDe+'T00:00:00');
  if(filtroAte) q=q.lte('criado_em',filtroAte+'T23:59:59');
  const{data}=await q;
  if(!data||!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>Nenhum registro encontrado.</p></div>';elMais.style.display='none';return;}
  const ICONES={'Dados pessoais':'👤','Consulta':'📅','Lançamento':'💰','Documento':'📄','Estoque':'📦','Entrada de estoque':'📦','Produto':'📦','Fornecedor':'🏭','Exportação':'📤','Atendimento':'🩺','Lembrete':'📌','Foto':'📸','Orçamento':'📋','Bloqueio':'🚫'};
  function icone(acao){for(const[k,v] of Object.entries(ICONES)){if(acao.includes(k)) return v;} return '🔍';}
  const rows=data.map(h=>{
    const dt=new Date(h.criado_em);
    const dtStr=dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    const pacNome=h.pacientes?.nome||'';
    return`<div style="display:flex;gap:10px;padding:8px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--borda);align-items:flex-start">
      <span style="font-size:16px;margin-top:1px">${icone(h.acao||'')}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;color:var(--txt)">${escapeHtml(h.acao||'—')}</div>
        <div style="font-size:11px;color:var(--ct);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(h.descricao||'')}</div>
        ${pacNome?`<div style="font-size:11px;color:var(--verde-e);margin-top:2px">👤 ${escapeHtml(pacNome)}</div>`:''}
      </div>
      <div style="font-size:11px;color:var(--ct);white-space:nowrap;flex-shrink:0">${dtStr}</div>
    </div>`;
  }).join('');
  if(append) el.innerHTML+=rows;
  else el.innerHTML=rows;
  elMais.style.display=data.length===50?'block':'none';
  audOffset+=data.length;
}


var audOffset=0;renderAuditoria();
