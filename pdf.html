<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Documentos PDF — Clínica</title>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--verde:#1D9E75;--verde-c:#E1F5EE;--verde-e:#0F6E56;--vermelho:#E24B4A;--txt:#1a1916;--ct:#6B6860;--bg:#F7F6F3;--card:#fff;--borda:#E8E6E1}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
    .hdr{background:var(--verde-e);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .hdr a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px}
    .hdr h1{font-size:15px;font-weight:600;flex:1}
    .wrap{max-width:860px;margin:0 auto;padding:1.5rem}
    .tipos{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--card);border-radius:12px;padding:4px;border:1px solid var(--borda)}
    .tipo-btn{flex:1;padding:.6rem;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--ct);background:none;transition:.15s;display:flex;align-items:center;justify-content:center;gap:.4rem}
    .tipo-btn.active{background:var(--verde);color:#fff}
    .busca-wrap{position:relative;margin-bottom:1rem}
    .busca-input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--borda);border-radius:10px;font-size:14px;font-family:inherit;background:var(--card);color:var(--txt)}
    .busca-input:focus{outline:none;border-color:var(--verde)}
    .busca-lista{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--card);border:1.5px solid var(--verde);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);margin-top:3px;max-height:220px;overflow-y:auto;display:none}
    .busca-lista.show{display:block}
    .busca-item{padding:.75rem 1rem;cursor:pointer;border-bottom:1px solid var(--borda);font-size:14px}
    .busca-item:last-child{border-bottom:none}
    .busca-item:hover,.busca-item:active{background:var(--verde-c)}
    .busca-item strong{color:var(--txt);display:block}
    .busca-item span{font-size:12px;color:var(--ct)}
    .pac-sel{display:flex;align-items:center;gap:.875rem;padding:.875rem 1rem;background:var(--verde-c);border-radius:10px;margin-bottom:1rem;border:1px solid #9FE1CB}
    .pac-av{width:40px;height:40px;border-radius:50%;background:var(--verde);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
    .pac-info{flex:1}
    .pac-nome{font-weight:700;font-size:14px;color:var(--verde-e)}
    .pac-meta{font-size:12px;color:var(--ct)}
    .pac-trocar{background:none;border:none;cursor:pointer;font-size:12px;color:var(--ct);text-decoration:underline;font-family:inherit}
    .opcoes{background:var(--card);border-radius:12px;border:1px solid var(--borda);padding:1.25rem;margin-bottom:1rem}
    .opc-title{font-size:12px;font-weight:700;color:var(--ct);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.875rem}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    @media(max-width:500px){.fg{grid-template-columns:1fr}}
    .fi{display:flex;flex-direction:column;gap:.375rem}
    .fi label{font-size:11px;font-weight:700;color:var(--ct);text-transform:uppercase;letter-spacing:.04em}
    .fi input,.fi select,.fi textarea{padding:.5rem .75rem;border:1.5px solid var(--borda);border-radius:8px;font-size:13px;font-family:inherit;color:var(--txt);background:var(--card)}
    .fi textarea{resize:vertical;min-height:72px}
    .check-row{display:flex;align-items:center;gap:.5rem;font-size:13px;cursor:pointer}
    .check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--verde)}
    .btn-gerar{width:100%;background:var(--verde);color:#fff;border:none;border-radius:10px;padding:.875rem;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
    .btn-gerar:disabled{opacity:.5;cursor:not-allowed}
    .preview-wrap{margin-top:1.25rem;display:none}
    .preview-wrap.show{display:block}
    .preview-actions{display:flex;gap:.625rem;margin-bottom:.875rem}
    .btn-imp{padding:.6rem 1.25rem;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid var(--borda);background:var(--card);color:var(--txt)}
    .btn-imp.pri{background:var(--verde);color:#fff;border-color:var(--verde)}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--txt);color:#fff;padding:.625rem 1.25rem;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;transform:translateY(8px)}
    .toast.show{opacity:1;transform:none}
    .toast.ok{background:var(--verde-e)}
    .toast.err{background:var(--vermelho)}
    #doc-preview{background:#fff;border:1px solid var(--borda);border-radius:12px;overflow:hidden;font-family:'DM Sans',sans-serif}
    .doc-header{background:var(--verde-e);color:#fff;padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .doc-logo{width:60px;height:60px;border-radius:10px;object-fit:contain;background:#fff;padding:4px}
    .doc-clinica-nome{font-size:18px;font-weight:700}
    .doc-clinica-esp{font-size:12px;opacity:.8;margin-top:2px}
    .doc-clinica-contact{font-size:11px;opacity:.7;margin-top:6px;line-height:1.6}
    .doc-tipo{font-size:11px;font-weight:700;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;white-space:nowrap}
    .doc-body{padding:1.75rem 2rem}
    .doc-section{margin-bottom:1.5rem}
    .doc-section-title{font-size:11px;font-weight:700;color:var(--ct);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--borda);padding-bottom:.5rem;margin-bottom:.875rem}
    .doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .75rem}
    .doc-field{display:flex;flex-direction:column;gap:2px}
    .doc-field-label{font-size:10px;color:var(--ct);text-transform:uppercase;letter-spacing:.04em}
    .doc-field-value{font-size:13px;font-weight:500;color:var(--txt)}
    .doc-table{width:100%;border-collapse:collapse;font-size:13px}
    .doc-table th{background:#F7F6F3;padding:.5rem .75rem;text-align:left;font-size:11px;font-weight:700;color:var(--ct);text-transform:uppercase;border:1px solid var(--borda)}
    .doc-table td{padding:.6rem .75rem;border:1px solid var(--borda);color:var(--txt)}
    .doc-table tr:nth-child(even) td{background:#FAFAFA}
    .doc-total{display:flex;justify-content:flex-end;margin-top:.875rem}
    .doc-total-box{background:var(--verde-c);border-radius:8px;padding:.75rem 1.25rem;text-align:right}
    .doc-total-label{font-size:11px;color:var(--ct)}
    .doc-total-valor{font-size:22px;font-weight:700;color:var(--verde-e)}
    .doc-obs{background:#F7F6F3;border-radius:8px;padding:.875rem;font-size:13px;color:var(--ct);line-height:1.6;margin-top:1rem}
    .doc-assinatura{display:flex;gap:2rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--borda)}
    .doc-assin-item{flex:1;text-align:center}
    .doc-assin-linha{border-bottom:1px solid var(--txt);margin-bottom:.375rem;height:40px}
    .doc-assin-label{font-size:11px;color:var(--ct)}
    .doc-footer{background:#F7F6F3;padding:.875rem 2rem;text-align:center;font-size:11px;color:var(--ct);border-top:1px solid var(--borda)}
    @media print{.hdr,.tipos,.busca-wrap,.pac-sel .pac-trocar,.opcoes,.btn-gerar,.preview-actions,.toast{display:none!important}.wrap{padding:0;max-width:100%}#doc-preview{border:none!important;border-radius:0!important}body{background:#fff}.preview-wrap{margin:0;display:block!important}}
  </style>
</head>
<body>

<div class="hdr">
  <a href="gestao.html">← Gestão</a>
  <h1 id="hdr-titulo">📄 Documentos PDF</h1>
</div>

<div class="wrap">
  <div class="tipos">
    <button class="tipo-btn active" id="btn-ficha" onclick="setTipo('ficha')">🗂️ Ficha</button>
    <button class="tipo-btn" id="btn-orcamento" onclick="setTipo('orcamento')">📋 Orçamento</button>
    <button class="tipo-btn" id="btn-recibo" onclick="setTipo('recibo')">🧾 Recibo</button>
  </div>

  <div class="busca-wrap" id="busca-wrap">
    <input class="busca-input" type="text" id="busca-input"
      placeholder="🔍 Buscar paciente..." oninput="buscar(this.value)" autocomplete="off"/>
    <div class="busca-lista" id="busca-lista"></div>
  </div>

  <div class="pac-sel" id="pac-sel" style="display:none">
    <div class="pac-av" id="pac-av">?</div>
    <div class="pac-info">
      <div class="pac-nome" id="pac-nome-sel">—</div>
      <div class="pac-meta" id="pac-meta-sel">—</div>
    </div>
    <button class="pac-trocar" onclick="trocar()">Trocar</button>
  </div>

  <div class="opcoes" id="opcoes-ficha">
    <div class="opc-title">Opções da ficha</div>
    <div style="display:flex;flex-direction:column;gap:.5rem">
      <label class="check-row"><input type="checkbox" id="opt-dados" checked/> Dados pessoais</label>
      <label class="check-row"><input type="checkbox" id="opt-consultas" checked/> Histórico de consultas</label>
      <label class="check-row"><input type="checkbox" id="opt-plano" checked/> Plano de tratamento</label>
      <label class="check-row"><input type="checkbox" id="opt-financeiro"/> Histórico financeiro</label>
    </div>
  </div>

  <div class="opcoes" id="opcoes-orcamento" style="display:none">
    <div class="opc-title">Opções do orçamento</div>
    <div class="fg">
      <div class="fi"><label>Validade</label>
        <select id="opt-validade"><option value="15">15 dias</option><option value="30" selected>30 dias</option><option value="60">60 dias</option><option value="90">90 dias</option></select>
      </div>
      <div class="fi"><label>Forma de pagamento</label>
        <select id="opt-forma"><option value="">A combinar</option><option>À vista</option><option>Cartão de crédito</option><option>Pix</option><option>Parcelado</option></select>
      </div>
    </div>
    <div class="fi" style="margin-top:.75rem"><label>Observações</label><textarea id="opt-obs-orc" placeholder="Informações adicionais..."></textarea></div>
  </div>

  <div class="opcoes" id="opcoes-recibo" style="display:none">
    <div class="opc-title">Dados do recibo</div>
    <div class="fg">
      <div class="fi"><label>Serviço</label><input type="text" id="opt-servico" placeholder="Ex: Consulta"/></div>
      <div class="fi"><label>Valor (R$)</label><input type="number" id="opt-valor-rec" min="0" step="0.01"/></div>
      <div class="fi"><label>Forma de pagamento</label>
        <select id="opt-forma-rec"><option>Dinheiro</option><option>Pix</option><option>Cartão de débito</option><option>Cartão de crédito</option><option>Transferência</option></select>
      </div>
      <div class="fi"><label>Data</label><input type="date" id="opt-data-rec"/></div>
    </div>
    <div class="fi" style="margin-top:.75rem"><label>Observações</label><textarea id="opt-obs-rec" placeholder="Observações..."></textarea></div>
  </div>

  <button class="btn-gerar" id="btn-gerar" onclick="gerar()" disabled>📄 Gerar documento</button>

  <div class="preview-wrap" id="preview-wrap">
    <div class="preview-actions">
      <button class="btn-imp pri" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
      <button class="btn-imp" onclick="gerar()">↻ Atualizar</button>
    </div>
    <div id="doc-preview"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Estado global ──
var PAC = null;        // paciente selecionado
var PACS = [];         // lista de pacientes
var TIPO = 'ficha';    // tipo de documento
var CFG = {};          // config da clínica
var TOKEN = '';        // access token

// ── Utilitários ──
function fmt(v){return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function dt(s){if(!s)return '—';var p=s.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function dtHoje(){return dt(new Date().toISOString());}
function anos(s){if(!s)return '';var n=new Date(),b=new Date(s),a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a+' anos';}
function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast show '+(t||'ok');setTimeout(function(){e.classList.remove('show');},3000);}

// ── Fetch autenticado ──
function api(tabela, qs){
  return fetch(SB_URL+'/rest/v1/'+tabela+'?'+qs, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+TOKEN}
  }).then(function(r){return r.json();});
}

// ── Busca de paciente ──
function norm(s){return (s||'').toLowerCase().replace(/[áàãâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i').replace(/[óòõôö]/g,'o').replace(/[úùûü]/g,'u').replace(/ç/g,'c');}

var _buscarTimer=null;
function buscar(q){
  var lista=document.getElementById('busca-lista');
  if(!q||q.length<2){lista.classList.remove('show');return;}
  
  // Sempre busca no servidor para garantir resultado correto
  lista.innerHTML='<div class="busca-item"><span style="color:var(--ct)">🔍 Buscando...</span></div>';
  lista.classList.add('show');
  clearTimeout(_buscarTimer);
  _buscarTimer=setTimeout(function(){
    if(!TOKEN){lista.innerHTML='<div class="busca-item"><span style="color:var(--vermelho)">Aguarde, conectando...</span></div>';return;}
    fetch(SB_URL+'/rest/v1/pacientes?select=id,nome,telefone,data_nascimento&nome=ilike.%25'+encodeURIComponent(q)+'%25&order=nome&limit=8',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+TOKEN}
    }).then(function(r){return r.json();}).then(function(d){
      if(Array.isArray(d)){mostrarResultados(d,lista);}
    }).catch(function(){lista.innerHTML='<div class="busca-item"><span style="color:var(--vermelho)">Erro na busca.</span></div>';});
  },400);
}

function mostrarResultados(res,lista){
  if(!res.length){lista.innerHTML='<div class="busca-item"><span style="color:var(--ct)">Nenhum paciente encontrado.</span></div>';lista.classList.add('show');return;}
  lista.innerHTML=res.map(function(p,i){return '<div class="busca-item" data-i="'+i+'"><strong>'+esc(p.nome)+'</strong><span>'+(p.telefone||'Sem telefone')+(p.data_nascimento?' · '+dt(p.data_nascimento):'')+'</span></div>';}).join('');
  lista.querySelectorAll('.busca-item').forEach(function(el,i){
    el.addEventListener('mousedown',function(e){e.preventDefault();selPac(res[i]);});
    el.addEventListener('touchend',function(e){e.preventDefault();selPac(res[i]);});
  });
  lista.classList.add('show');
}

function selPac(p){
  PAC=p;
  document.getElementById('pac-av').textContent=(p.nome||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
  document.getElementById('pac-nome-sel').textContent=p.nome;
  var m=[];if(p.telefone)m.push(p.telefone);if(p.data_nascimento)m.push(dt(p.data_nascimento));
  document.getElementById('pac-meta-sel').textContent=m.join(' · ')||'—';
  document.getElementById('pac-sel').style.display='flex';
  document.getElementById('busca-wrap').style.display='none';
  document.getElementById('busca-lista').classList.remove('show');
  document.getElementById('btn-gerar').disabled=false;
}

function trocar(){
  PAC=null;
  document.getElementById('pac-sel').style.display='none';
  document.getElementById('busca-wrap').style.display='block';
  document.getElementById('busca-input').value='';
  document.getElementById('busca-lista').classList.remove('show');
  document.getElementById('btn-gerar').disabled=true;
  document.getElementById('preview-wrap').classList.remove('show');
}

document.addEventListener('click',function(e){if(!e.target.closest('.busca-wrap'))document.getElementById('busca-lista').classList.remove('show');});

// ── Tipo de documento ──
function setTipo(t){
  TIPO=t;
  ['ficha','orcamento','recibo'].forEach(function(x){
    document.getElementById('btn-'+x).classList.toggle('active',x===t);
    document.getElementById('opcoes-'+x).style.display=x===t?'block':'none';
  });
  document.getElementById('hdr-titulo').textContent={ficha:'🗂️ Ficha do paciente',orcamento:'📋 Orçamento',recibo:'🧾 Recibo'}[t];
  document.getElementById('preview-wrap').classList.remove('show');
}

// ── Gerar documento ──
function gerar(){
  if(!PAC){toast('Selecione um paciente.','err');return;}
  var btn=document.getElementById('btn-gerar');
  btn.disabled=true;btn.textContent='⏳ Gerando...';
  var p;
  if(TIPO==='ficha') p=gerarFicha();
  else if(TIPO==='orcamento') p=gerarOrcamento();
  else p=gerarRecibo();
  p.then(function(){
    document.getElementById('preview-wrap').classList.add('show');
    document.getElementById('preview-wrap').scrollIntoView({behavior:'smooth'});
    btn.disabled=false;btn.textContent='📄 Gerar documento';
  }).catch(function(e){
    toast('Erro: '+e.message,'err');
    btn.disabled=false;btn.textContent='📄 Gerar documento';
  });
}

// ── FICHA ──
function gerarFicha(){
  var pac=PAC;
  var opts={
    dados:document.getElementById('opt-dados').checked,
    consultas:document.getElementById('opt-consultas').checked,
    plano:document.getElementById('opt-plano').checked,
    fin:document.getElementById('opt-financeiro').checked
  };
  var promises=[
    opts.consultas?api('agenda','select=data,hora,procedimento,status&paciente_id=eq.'+pac.id+'&order=data.desc&limit=20'):Promise.resolve([]),
    opts.plano?api('planos_tratamento','select=id,criado_em,status,observacoes,plano_itens(procedimento,valor,status)&paciente_id=eq.'+pac.id+'&order=criado_em.desc&limit=5'):Promise.resolve([]),
    opts.fin?api('financeiro','select=descricao,valor,tipo,status,data_vencimento&paciente_id=eq.'+pac.id+'&order=data_vencimento.desc&limit=20'):Promise.resolve([])
  ];
  return Promise.all(promises).then(function(rs){
    var cons=Array.isArray(rs[0])?rs[0]:[];
    var planos=Array.isArray(rs[1])?rs[1]:[];
    var fin=Array.isArray(rs[2])?rs[2]:[];
    var html=cabecalho('FICHA DO PACIENTE')+'<div class="doc-body">';
    if(opts.dados){
      html+='<div class="doc-section"><div class="doc-section-title">Dados pessoais</div><div class="doc-grid">';
      html+='<div class="doc-field"><div class="doc-field-label">Nome</div><div class="doc-field-value">'+esc(pac.nome)+'</div></div>';
      html+='<div class="doc-field"><div class="doc-field-label">Telefone</div><div class="doc-field-value">'+(pac.telefone||'—')+'</div></div>';
      html+='<div class="doc-field"><div class="doc-field-label">Nascimento</div><div class="doc-field-value">'+(pac.data_nascimento?dt(pac.data_nascimento)+' ('+anos(pac.data_nascimento)+')':'—')+'</div></div>';
      html+='<div class="doc-field"><div class="doc-field-label">Emissão</div><div class="doc-field-value">'+dtHoje()+'</div></div>';
      html+='</div></div>';
    }
    if(opts.consultas&&cons.length){
      html+='<div class="doc-section"><div class="doc-section-title">Histórico de consultas</div>';
      html+='<table class="doc-table"><tr><th>Data</th><th>Horário</th><th>Procedimento</th><th>Status</th></tr>';
      cons.forEach(function(c){html+='<tr><td>'+dt(c.data)+'</td><td>'+(c.hora||'—')+'</td><td>'+esc(c.procedimento||'—')+'</td><td>'+(c.status||'—')+'</td></tr>';});
      html+='</table></div>';
    }
    if(opts.plano&&planos.length){
      html+='<div class="doc-section"><div class="doc-section-title">Planos de tratamento</div>';
      planos.forEach(function(pl){
        html+='<div style="margin-bottom:1rem"><div style="font-size:12px;color:var(--ct);margin-bottom:.5rem">Plano de '+dt(pl.criado_em)+' — '+(pl.status||'ativo')+'</div>';
        if(pl.plano_itens&&pl.plano_itens.length){
          html+='<table class="doc-table"><tr><th>Procedimento</th><th>Valor</th><th>Status</th></tr>';
          pl.plano_itens.forEach(function(it){html+='<tr><td>'+esc(it.procedimento||'—')+'</td><td>'+(it.valor?'R$ '+fmt(it.valor):'—')+'</td><td>'+(it.status||'—')+'</td></tr>';});
          html+='</table>';
        }
        if(pl.observacoes)html+='<div class="doc-obs">'+esc(pl.observacoes)+'</div>';
        html+='</div>';
      });
      html+='</div>';
    }
    if(opts.fin&&fin.length){
      html+='<div class="doc-section"><div class="doc-section-title">Histórico financeiro</div>';
      html+='<table class="doc-table"><tr><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr>';
      fin.forEach(function(f){html+='<tr><td>'+esc(f.descricao||'—')+'</td><td>'+(f.tipo||'—')+'</td><td>R$ '+fmt(f.valor)+'</td><td>'+dt(f.data_vencimento)+'</td><td>'+(f.status||'—')+'</td></tr>';});
      html+='</table></div>';
    }
    html+=assinatura()+rodape()+'</div>';
    document.getElementById('doc-preview').innerHTML=html;
  });
}

// ── ORÇAMENTO ──
function gerarOrcamento(){
  var pac=PAC;
  return api('planos_tratamento','select=id,criado_em,observacoes,plano_itens(procedimento,valor)&paciente_id=eq.'+pac.id+'&order=criado_em.desc&limit=1')
  .then(function(planos){
    var pl=Array.isArray(planos)&&planos[0]?planos[0]:null;
    var itens=pl&&pl.plano_itens?pl.plano_itens:[];
    var total=itens.reduce(function(s,i){return s+Number(i.valor||0);},0);
    var val=Number(document.getElementById('opt-validade').value||30);
    var forma=document.getElementById('opt-forma').value;
    var obs=document.getElementById('opt-obs-orc').value;
    var dtVal=new Date();dtVal.setDate(dtVal.getDate()+val);
    var html=cabecalho('ORÇAMENTO')+'<div class="doc-body">';
    html+='<div class="doc-section"><div class="doc-section-title">Dados do paciente</div><div class="doc-grid">';
    html+='<div class="doc-field"><div class="doc-field-label">Nome</div><div class="doc-field-value">'+esc(pac.nome)+'</div></div>';
    html+='<div class="doc-field"><div class="doc-field-label">Telefone</div><div class="doc-field-value">'+(pac.telefone||'—')+'</div></div>';
    html+='<div class="doc-field"><div class="doc-field-label">Emissão</div><div class="doc-field-value">'+dtHoje()+'</div></div>';
    html+='<div class="doc-field"><div class="doc-field-label">Válido até</div><div class="doc-field-value">'+dt(dtVal.toISOString())+'</div></div>';
    html+='</div></div>';
    if(itens.length){
      html+='<div class="doc-section"><div class="doc-section-title">Procedimentos</div>';
      html+='<table class="doc-table"><tr><th>#</th><th>Procedimento</th><th style="text-align:right">Valor</th></tr>';
      itens.forEach(function(it,i){html+='<tr><td style="width:40px;color:var(--ct)">'+(i+1)+'</td><td>'+esc(it.procedimento||'—')+'</td><td style="text-align:right;font-weight:600">R$ '+fmt(it.valor||0)+'</td></tr>';});
      html+='</table>';
      html+='<div class="doc-total"><div class="doc-total-box"><div class="doc-total-label">Total</div><div class="doc-total-valor">R$ '+fmt(total)+'</div>'+(forma?'<div style="font-size:11px;color:var(--ct)">'+esc(forma)+'</div>':'')+'</div></div>';
      html+='</div>';
    }
    if(obs)html+='<div class="doc-obs"><strong>Observações:</strong> '+esc(obs)+'</div>';
    html+=assinatura('Paciente','Profissional')+rodape()+'</div>';
    document.getElementById('doc-preview').innerHTML=html;
  });
}

// ── RECIBO ──
function gerarRecibo(){
  var pac=PAC;
  var serv=document.getElementById('opt-servico').value||'Consulta / Procedimento';
  var val=parseFloat(document.getElementById('opt-valor-rec').value)||0;
  var forma=document.getElementById('opt-forma-rec').value;
  var data=document.getElementById('opt-data-rec').value;
  var obs=document.getElementById('opt-obs-rec').value;
  var num='REC-'+Date.now().toString().slice(-6);
  var html=cabecalho('RECIBO DE PAGAMENTO')+'<div class="doc-body">';
  html+='<div style="text-align:center;margin-bottom:1.5rem"><div style="font-size:36px;font-weight:700;color:var(--verde-e)">R$ '+fmt(val)+'</div><div style="font-size:13px;color:var(--ct)">Valor recebido</div><div style="font-size:11px;color:var(--ct)">'+num+'</div></div>';
  html+='<div class="doc-section"><div class="doc-section-title">Dados do pagamento</div><div class="doc-grid">';
  html+='<div class="doc-field"><div class="doc-field-label">Pagador</div><div class="doc-field-value">'+esc(pac.nome)+'</div></div>';
  html+='<div class="doc-field"><div class="doc-field-label">Serviço</div><div class="doc-field-value">'+esc(serv)+'</div></div>';
  html+='<div class="doc-field"><div class="doc-field-label">Forma de pagamento</div><div class="doc-field-value">'+esc(forma)+'</div></div>';
  html+='<div class="doc-field"><div class="doc-field-label">Data</div><div class="doc-field-value">'+(data?dt(data):dtHoje())+'</div></div>';
  html+='</div></div>';
  if(obs)html+='<div class="doc-obs">'+esc(obs)+'</div>';
  html+='<div style="background:var(--verde-c);border-radius:8px;padding:.875rem;font-size:12px;color:var(--verde-e);margin-top:1rem">Declaro que recebi R$ '+fmt(val)+' referente a '+esc(serv)+'.</div>';
  html+=assinatura('Pagador ('+esc(pac.nome)+')','Profissional')+rodape()+'</div>';
  document.getElementById('doc-preview').innerHTML=html;
  return Promise.resolve();
}

// ── Componentes do documento ──
function cabecalho(tipo){
  var c=CFG;
  var contatos=[];
  if(c.telefone)contatos.push('Tel: '+c.telefone);
  if(c.email)contatos.push(c.email);
  var end=[c.rua&&c.numero?c.rua+', '+c.numero:c.rua||'',c.cidade&&c.uf?c.cidade+'/'+c.uf:''].filter(Boolean).join(' — ');
  return '<div class="doc-header" style="background:'+(c.cor_principal||'#0F6E56')+'"><div><div class="doc-clinica-nome">'+esc(c.nome||CLINICA_CONFIG.nome)+'</div><div class="doc-clinica-esp">'+esc(c.especialidade||CLINICA_CONFIG.especialidade)+'</div>'+(contatos.length||end?'<div class="doc-clinica-contact">'+[...contatos,end].filter(Boolean).join(' · ')+'</div>':'')+'</div><div style="text-align:right"><img class="doc-logo" src="'+(c.logo_url||'logo.jpg')+'" onerror="this.style.display=\'none\'"/><div><span class="doc-tipo" style="margin-top:8px;display:inline-block">'+tipo+'</span></div></div></div>';
}
function assinatura(esq,dir){
  esq=esq||'Paciente';dir=dir||CFG.nome||CLINICA_CONFIG.nome;
  return '<div class="doc-assinatura"><div class="doc-assin-item"><div class="doc-assin-linha"></div><div class="doc-assin-label">'+esc(esq)+'</div></div><div class="doc-assin-item"><div class="doc-assin-linha"></div><div class="doc-assin-label">'+esc(dir)+'</div></div></div>';
}
function rodape(){
  return '<div class="doc-footer">Documento gerado em '+dtHoje()+' · '+esc(CFG.nome||CLINICA_CONFIG.nome)+'</div>';
}

// ── INICIALIZAÇÃO ──
(function(){
  // Verificar auth
  var auth=JSON.parse(localStorage.getItem('clinica_auth')||'{}');
  if(!auth.ok){window.location.href='login.html?r=pdf.html';return;}

  // Configurar data do recibo
  document.getElementById('opt-data-rec').value=new Date().toISOString().split('T')[0];

  // Verificar tipo na URL
  var params=new URLSearchParams(window.location.search);
  var tipo=params.get('tipo');
  if(tipo)setTipo(tipo);

  // Renovar token e depois carregar dados
  var renovar=auth.refresh_token
    ?fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SB_KEY},
        body:JSON.stringify({refresh_token:auth.refresh_token})
      }).then(function(r){return r.json();}).then(function(d){
        if(d.access_token){
          auth.access_token=d.access_token;
          auth.refresh_token=d.refresh_token||auth.refresh_token;
          auth.expires=Date.now()+24*60*60*1000;
          localStorage.setItem('clinica_auth',JSON.stringify(auth));
        }
        return auth.access_token;
      }).catch(function(){return auth.access_token;})
    :Promise.resolve(auth.access_token);

  renovar.then(function(token){
    TOKEN=token;

    // Carregar config e pacientes em paralelo
    var carregarCfg=fetch(SB_URL+'/rest/v1/config_clinica?select=*&limit=1',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+TOKEN}
    }).then(function(r){return r.json();}).then(function(d){if(Array.isArray(d)&&d.length)CFG=d[0];}).catch(function(){});

    var carregarPacs=fetch(SB_URL+'/rest/v1/pacientes?select=id,nome,telefone,data_nascimento&order=nome',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+TOKEN}
    }).then(function(r){return r.json();}).then(function(d){
      if(Array.isArray(d)){
        PACS=d;
        // Se o usuário já digitou algo enquanto carregava, refaz a busca
        var q=document.getElementById('busca-input').value;
        if(q&&q.length>=2)buscar(q);
      }
    }).catch(function(e){console.error('Erro ao carregar pacientes:',e);});

    return Promise.all([carregarCfg,carregarPacs]);
  });
})();
</script>
