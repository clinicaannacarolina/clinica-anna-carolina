<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadastrar Nova Clínica — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root{
  --verde:#1D9E75;--verde-e:#0F6E56;--verde-c:#E1F5EE;
  --vermelho:#E24B4A;--vermelho-c:#FCEBEB;
  --bg:#F7F6F3;--card:#FFFFFF;--borda:#E8E6E1;--ct:#6B6860;--txt:#1A1916;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:2rem 1rem}
.main{max-width:560px;margin:0 auto}
h1{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px}
.sub{color:var(--ct);font-size:13px;margin-bottom:1.5rem}
.card{background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:1.25rem}
.card h2{font-size:14px;color:var(--verde-e);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.03em}
.fgr{margin-bottom:.9rem}
.fgr label{display:block;font-size:12px;font-weight:600;color:var(--ct);margin-bottom:4px}
.fgr input{width:100%;padding:10px 12px;border:1.5px solid var(--borda);border-radius:8px;font-size:14px;font-family:inherit}
.fgr input:focus{outline:none;border-color:var(--verde)}
.linha2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--verde);color:white;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--verde-e)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{margin-top:1rem;padding:12px 14px;border-radius:10px;font-size:13px;display:none;line-height:1.6}
.msg.erro{background:var(--vermelho-c);color:var(--vermelho);display:block}
.msg.sucesso{background:var(--verde-c);color:var(--verde-e);display:block}
.msg.sucesso a{color:var(--verde-e);font-weight:700}
.msg code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px}
</style>
</head>
<body>

<div class="main">
  <h1>🏥 Cadastrar Nova Clínica</h1>
  <div class="sub">Ferramenta interna — cria a clínica, a configuração inicial e o primeiro login de administrador, tudo de uma vez.</div>

  <div class="card">
    <h2>Dados da clínica</h2>
    <div class="fgr"><label>Nome da clínica *</label><input type="text" id="f-nome-clinica" placeholder="Ex: Clínica Dra. Fulana de Tal"/></div>
    <div class="fgr"><label>Slug (identificador na URL — opcional, gera sozinho se deixar em branco)</label><input type="text" id="f-slug" placeholder="Ex: fulana-de-tal"/></div>
    <div class="linha2">
      <div class="fgr"><label>Especialidade</label><input type="text" id="f-especialidade" placeholder="Ex: Odontologia"/></div>
      <div class="fgr"><label>Telefone/WhatsApp</label><input type="text" id="f-telefone" placeholder="(17) 99999-9999"/></div>
    </div>
    <div class="fgr"><label>Cor principal</label><input type="color" id="f-cor" value="#1D9E75" style="height:42px;padding:4px"/></div>
  </div>

  <div class="card">
    <h2>Primeiro administrador</h2>
    <div class="fgr"><label>Nome *</label><input type="text" id="f-admin-nome" placeholder="Nome de quem vai administrar"/></div>
    <div class="fgr"><label>E-mail de acesso *</label><input type="email" id="f-admin-email" placeholder="email@exemplo.com"/></div>
    <div class="fgr"><label>Senha inicial (mín. 4 dígitos) *</label><input type="password" id="f-admin-senha" placeholder="••••"/></div>
  </div>

  <div class="card">
    <h2>Autorização</h2>
    <div class="fgr"><label>Senha de administração *</label><input type="password" id="f-admin-secret" placeholder="Senha que só você conhece"/></div>
  </div>

  <button class="btn" id="btn-criar" onclick="criarClinica()">Criar clínica</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SB_URL='https://nathaeuqbeqlvkftbmes.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdGhhZXVxYmVxbHZrZnRibWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTc4MzYsImV4cCI6MjA5NTQ3MzgzNn0.9t3q5C_h1pRb11gqRtpGGVpOUGey5TBzvMgal8h6wtg';

async function criarClinica(){
  const msg=document.getElementById('msg');
  const btn=document.getElementById('btn-criar');
  msg.className='msg';msg.textContent='';

  const nome_clinica=document.getElementById('f-nome-clinica').value.trim();
  const slug=document.getElementById('f-slug').value.trim();
  const especialidade=document.getElementById('f-especialidade').value.trim();
  const telefone=document.getElementById('f-telefone').value.trim();
  const cor_principal=document.getElementById('f-cor').value;
  const admin_nome=document.getElementById('f-admin-nome').value.trim();
  const admin_email=document.getElementById('f-admin-email').value.trim();
  const admin_senha=document.getElementById('f-admin-senha').value;
  const admin_secret=document.getElementById('f-admin-secret').value;

  if(!nome_clinica||!admin_nome||!admin_email||!admin_senha||!admin_secret){
    msg.className='msg erro';msg.textContent='Preencha todos os campos obrigatórios (*).';return;
  }

  btn.disabled=true;btn.textContent='Criando...';

  try{
    const res=await fetch(`${SB_URL}/functions/v1/criar-clinica`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`},
      body:JSON.stringify({admin_secret,nome_clinica,slug,especialidade,telefone,cor_principal,admin_nome,admin_email,admin_senha})
    });
    const d=await res.json();
    if(!res.ok){
      msg.className='msg erro';msg.textContent=d.error||'Erro ao criar clínica.';
      return;
    }
    msg.className='msg sucesso';
    msg.innerHTML=`✅ Clínica <strong>${nome_clinica}</strong> criada com sucesso!<br/><br/>
      Slug: <code>${d.slug}</code><br/>
      Link do sistema: <code>${d.link_sistema}</code><br/>
      Link de login: <code>${d.link_login}</code><br/>
      Link de agendamento online: <code>${d.link_agendamento}</code><br/><br/>
      Login do admin: <strong>${admin_email}</strong> / senha definida agora.`;
  }catch(e){
    msg.className='msg erro';msg.textContent='Erro de conexão: '+e.message;
  }finally{
    btn.disabled=false;btn.textContent='Criar clínica';
  }
}
</script>
</body>
</html>
